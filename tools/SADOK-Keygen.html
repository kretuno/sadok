<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSIPIX - Генератор ключів</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d97706;
            --primary-light: #fbbf24;
            --bg: #fffcf0;
            --glass: rgba(255, 255, 255, 0.86);
            --shadow: 0 20px 40px rgba(217, 119, 6, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            background: radial-gradient(circle at top right, #fffbeb, #fff7ed, #fffcf0);
        }

        .sunflower-bg {
            position: absolute;
            font-size: 400px;
            opacity: 0.05;
            bottom: -100px;
            right: -100px;
            pointer-events: none;
            user-select: none;
            animation: rotate 60s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            width: 100%;
            max-width: 560px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 34px;
            padding: 36px;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 10;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        header {
            text-align: center;
            margin-bottom: 26px;
        }

        .logo {
            font-size: 44px;
            margin-bottom: 8px;
        }

        h1 {
            font-weight: 800;
            color: #1f2937;
            font-size: 24px;
        }

        p.subtitle {
            color: #6b7280;
            font-size: 13px;
            margin-top: 5px;
            font-weight: 500;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            margin-bottom: 8px;
            margin-left: 5px;
        }

        input {
            width: 100%;
            padding: 18px 24px;
            border-radius: 18px;
            border: 2px solid #f3f4f6;
            background: #f9fafb;
            font-size: 16px;
            font-weight: 700;
            outline: none;
            transition: all 0.25s ease;
            text-transform: uppercase;
        }

        input:focus {
            border-color: var(--primary-light);
            background: white;
            box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.06);
        }

        .form-group {
            margin-bottom: 22px;
        }

        .selector {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .product-btn,
        .type-btn {
            flex: 1;
            min-width: 150px;
            padding: 14px;
            border-radius: 16px;
            border: 2px solid #f3f4f6;
            background: #f9fafb;
            cursor: pointer;
            font-weight: 800;
            font-size: 12px;
            color: #6b7280;
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .product-btn.active,
        .type-btn.active {
            border-color: var(--primary);
            background: white;
            color: #1f2937;
            box-shadow: 0 10px 20px rgba(217, 119, 6, 0.09);
        }

        button.generate {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, #d97706, #f59e0b);
            color: white;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 15px 30px rgba(217, 119, 6, 0.22);
        }

        button.generate:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(217, 119, 6, 0.3);
        }

        .result {
            margin-top: 30px;
            padding-top: 24px;
            border-top: 2px dashed #f3f4f6;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-key {
            background: #1f2937;
            color: #10b981;
            padding: 22px;
            border-radius: 20px;
            text-align: center;
            font-family: Consolas, monospace;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .result-key:hover {
            transform: scale(1.02);
        }

        .copied-hint {
            text-align: center;
            font-size: 10px;
            color: #10b981;
            font-weight: 800;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .copied-hint.show {
            opacity: 1;
        }

        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
            color: #9ca3af;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="sunflower-bg">🌻</div>

    <div class="container">
        <header>
            <div class="logo">🔐</div>
            <h1>OSIPIX Keygen</h1>
            <p class="subtitle">Єдиний генератор ліцензійних ключів для продуктів OSIPIX</p>
        </header>

        <label>Продукт</label>
        <div class="selector" id="productSelector">
            <button class="product-btn active" data-product="SADOK" onclick="setProduct('SADOK')">SADOK</button>
            <button class="product-btn" data-product="PRORAHUNOK" onclick="setProduct('PRORAHUNOK')">ProRahunok</button>
        </div>

        <div class="form-group">
            <label>Код запиту від користувача</label>
            <input type="text" id="requestCode" placeholder="XXXXXXXXXXXXXXX" maxlength="16" autocomplete="off">
        </div>

        <label>Термін ліцензії</label>
        <div class="selector" id="typeSelector"></div>

        <button class="generate" onclick="generate()">Згенерувати ключ</button>

        <div class="result" id="resultArea">
            <label>Активаційний ключ (натисніть, щоб скопіювати)</label>
            <div class="result-key" id="licenseKey" onclick="copyKey()">XXXX-XXXX-XXXX-XXXX</div>
            <div class="copied-hint" id="copyHint">Ключ скопійовано</div>
        </div>

        <div class="footer-note">Версія 1.1.0 | Закрита утиліта розробника</div>
    </div>

    <script>
        const PRODUCTS = {
            SADOK: {
                secret: 'SADOK-LICENSE-SECRET-V1',
                defaultType: 'ANNUAL',
                types: [
                    ['DEMO', 'Демо 14 дн.'],
                    ['MONTHLY', '1 місяць'],
                    ['QUARTERLY', '3 місяці'],
                    ['HALFYEAR', '6 місяців'],
                    ['ANNUAL', '1 рік'],
                    ['LIFETIME', 'Назавжди'],
                ],
            },
            PRORAHUNOK: {
                secret: 'PRORAHUNOK-LICENSE-SECRET-V1',
                defaultType: 'ANNUAL',
                types: [
                    ['MONTHLY', '1 місяць'],
                    ['HALFYEAR', '6 місяців'],
                    ['ANNUAL', '1 рік'],
                    ['LIFETIME', 'Назавжди'],
                ],
            },
        };

        let currentProduct = 'SADOK';
        let currentType = PRODUCTS[currentProduct].defaultType;

        function setProduct(product) {
            currentProduct = product;
            currentType = PRODUCTS[product].defaultType;

            document.querySelectorAll('.product-btn').forEach((button) => {
                button.classList.toggle('active', button.dataset.product === product);
            });

            renderTypes();
            document.getElementById('resultArea').style.display = 'none';
        }

        function setType(type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach((button) => {
                button.classList.toggle('active', button.dataset.type === type);
            });
        }

        function renderTypes() {
            const typeSelector = document.getElementById('typeSelector');
            typeSelector.innerHTML = PRODUCTS[currentProduct].types.map(([type, label]) => `
                <button class="type-btn ${type === currentType ? 'active' : ''}" data-type="${type}" onclick="setType('${type}')">${label}</button>
            `).join('');
        }

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map((byte) => byte.toString(16).padStart(2, '0')).join('').toUpperCase();
        }

        async function generate() {
            const code = document.getElementById('requestCode').value.trim().toUpperCase();
            if (!code) {
                alert('Будь ласка, введіть код запиту.');
                return;
            }

            const rawHash = await sha256(code + currentType + PRODUCTS[currentProduct].secret);
            const key = `${rawHash.slice(0, 4)}-${rawHash.slice(4, 8)}-${rawHash.slice(8, 12)}-${rawHash.slice(12, 16)}`;

            document.getElementById('licenseKey').innerText = key;
            document.getElementById('resultArea').style.display = 'block';
        }

        function copyKey() {
            const key = document.getElementById('licenseKey').innerText;
            navigator.clipboard.writeText(key);

            const hint = document.getElementById('copyHint');
            hint.classList.add('show');
            setTimeout(() => hint.classList.remove('show'), 2000);
        }

        renderTypes();
    </script>
</body>
</html>
